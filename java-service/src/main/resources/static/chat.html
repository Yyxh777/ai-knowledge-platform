<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 静态页默认映射：http://主机:端口/chat.html（根路径）。勿混淆为磁盘路径 static 文件夹。 -->
    <title>AI 知识助手</title>
    <!-- Markdown 解析库：优先 BootCDN（国内直连），jsdelivr 需要代理 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script>
        // 降级兜底：若所有 CDN 均加载失败，提供最简渲染（保留换行、转义 HTML）
        if (typeof marked === 'undefined') {
            window.marked = {
                setOptions: function() {},
                parse: function(text) {
                    return text
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/\n/g, '<br>');
                }
            };
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #f3f4f6;
            color: #111827;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-body {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .history-panel {
            width: 260px;
            flex-shrink: 0;
            background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
            border-right: 1px solid #e8eaed;
            display: flex;
            flex-direction: column;
            min-height: 0;
            transition: width 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.26s ease,
                border-width 0.26s ease,
                min-width 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .app-body.history-collapsed .history-panel {
            width: 0;
            min-width: 0;
            opacity: 0;
            border-right-width: 0;
            pointer-events: none;
        }

        .history-title {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .history-refresh {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            background: #fff;
            cursor: pointer;
            color: #6b7280;
        }

        .history-refresh:hover {
            background: #f9fafb;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .history-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f9fafb;
            font-size: 12px;
            color: #1f2937;
        }

        .history-item:hover {
            background: #f9fafb;
        }

        .history-item.active {
            background: #eef2ff;
            border-left: 3px solid #6366f1;
            padding-left: 9px;
        }

        .history-meta {
            color: #9ca3af;
            font-size: 11px;
            margin-top: 4px;
        }

        .history-empty {
            padding: 12px;
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        .header {
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            padding: 10px 14px;
            border-bottom: 1px solid #e8eaed;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .history-toggle {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 11px;
            border: 1px solid #e5e7eb;
            background: linear-gradient(165deg, #ffffff 0%, #f3f4f6 100%);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
            color: #4f46e5;
        }

        .history-toggle:hover {
            border-color: #c7d2fe;
            background: linear-gradient(165deg, #ffffff 0%, #eef2ff 100%);
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.15);
            transform: translateY(-1px);
        }

        .history-toggle:active {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(79, 70, 229, 0.12);
        }

        .history-toggle svg {
            width: 22px;
            height: 22px;
            display: block;
        }

        .history-toggle .tg-icon-collapsed {
            display: none;
        }

        .history-toggle[aria-expanded="false"] .tg-icon-expanded {
            display: none;
        }

        .history-toggle[aria-expanded="false"] .tg-icon-collapsed {
            display: block;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
            letter-spacing: -0.02em;
        }

        .new-chat-btn {
            background: #ffffff;
            border: 1px solid #d1d5db;
            color: #374151;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #f3f4f6;
            border-color: #9ca3af;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 0;
        }

        .message-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.user {
            background: #f9fafb;
            padding: 14px 0;
        }

        .message-wrapper.assistant {
            background: #ffffff;
            padding: 14px 0;
            border-top: 1px solid #f3f4f6;
            border-bottom: 1px solid #f3f4f6;
        }

        .message {
            max-width: 820px;
            width: 100%;
            padding: 0 14px;
            display: flex;
            gap: 10px;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 11px;
            flex-shrink: 0;
        }

        .avatar.user {
            background: #9ca3af;
            color: #ffffff;
        }

        .avatar.assistant {
            background: #6b7280;
            color: #ffffff;
        }

        .message-content {
            flex: 1;
            line-height: 1.55;
            font-size: 13px;
            padding-top: 4px;
            color: #1f2937;
            word-wrap: break-word;
        }

        .message-content p {
            margin-bottom: 8px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .message-content h1:first-child,
        .message-content h2:first-child,
        .message-content h3:first-child {
            margin-top: 0;
        }

        .message-content h1 {
            font-size: 1.5em;
        }

        .message-content h2 {
            font-size: 1.3em;
        }

        .message-content h3 {
            font-size: 1.1em;
        }

        .message-content code {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message-content pre {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        .message-content blockquote {
            border-left: 3px solid #d1d5db;
            padding-left: 12px;
            margin: 8px 0;
            color: #6b7280;
        }

        .message-content a {
            color: #4b5563;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
        }

        .message-content br {
            content: '';
            display: block;
            margin: 4px 0;
        }

        .message-content th, .message-content td {
            border: 1px solid #d1d5db;
            padding: 8px;
            text-align: left;
        }

        .message-content th {
            background: #f3f4f6;
            font-weight: 600;
        }

        .typing-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #6b7280;
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .input-container {
            padding: 10px 14px;
            background: #ffffff;
            border-top: 1px solid #e5e7eb;
        }

        .input-wrapper {
            max-width: 820px;
            margin: 0 auto;
            position: relative;
            display: flex;
            gap: 8px;
        }

        #messageInput {
            flex: 1;
            background: #f9fafb;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 9px 42px 9px 12px;
            color: #111827;
            font-size: 13px;
            resize: none;
            min-height: 40px;
            max-height: 200px;
            outline: none;
            font-family: inherit;
        }

        #messageInput:focus {
            border-color: #9ca3af;
            background: #ffffff;
        }

        #sendButton {
            position: absolute;
            right: 8px;
            bottom: 8px;
            background: #4b5563;
            border: none;
            border-radius: 8px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            background: #374151;
        }

        #sendButton:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        #sendButton svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        .empty-state {
            width: 100%;
            max-width: 820px;
            margin: auto;
            padding: 30px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #6b7280;
        }

        .empty-state h2 {
            font-size: 24px;
            font-weight: 600;
            color: #111827;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 8px;
            max-width: 820px;
            width: 100%;
        }

        .suggestion {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .suggestion:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .suggestion-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: #1f2937;
            font-size: 13px;
        }

        .suggestion-text {
            font-size: 12px;
            color: #6b7280;
        }

        .connection-status {
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 500;
        }

        .connection-status.connected {
            background: #ecfdf5;
            color: #047857;
        }

        .connection-status.disconnected {
            background: #fef2f2;
            color: #b91c1c;
        }

        .connection-status.connecting {
            background: #f3f4f6;
            color: #4b5563;
        }

        /* 滚动条样式 */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #f3f4f6;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button type="button" id="toggleHistoryBtn" class="history-toggle" onclick="toggleHistoryPanel()"
                    title="收起历史对话" aria-expanded="true" aria-controls="historySidebar">
                <!-- 侧栏展开：双折线向左 = 收起 -->
                <svg class="tg-icon-expanded" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M5 5v14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
                    <path d="M19 7l-5 5 5 5M13 7l-5 5 5 5" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <!-- 侧栏收起：双折线向右 = 展开 -->
                <svg class="tg-icon-collapsed" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M5 5v14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.22"/>
                    <path d="M9 7l5 5-5 5M15 7l5 5-5 5" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <h1>AI 知识助手</h1>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <div id="userInfo" style="color: #6b7280; font-size: 12px;"></div>
            <div id="connectionStatus" class="connection-status connecting">正在连接...</div>
            <button class="new-chat-btn" onclick="clearChat()">+ 新对话</button>
            <button class="new-chat-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="app-body">
        <aside id="historySidebar" class="history-panel">
            <div class="history-title">
                <span>历史对话</span>
                <button type="button" class="history-refresh" onclick="loadConversationList()">刷新</button>
            </div>
            <div id="conversationList" class="conversation-list">
                <div class="history-empty">加载中…</div>
            </div>
        </aside>
        <div class="main-panel">
    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <h2>欢迎使用 AI 知识助手</h2>
            <p>我可以帮您解答员工手册相关的问题</p>
            <div class="suggestions">
                <div class="suggestion" onclick="sendSuggestion('公司的工作时间是怎么安排的？')">
                    <div class="suggestion-title">📅 工作时间</div>
                    <div class="suggestion-text">公司的工作时间是怎么安排的？</div>
                </div>
                <div class="suggestion" onclick="sendSuggestion('年假怎么申请？')">
                    <div class="suggestion-title">🏖️ 年假政策</div>
                    <div class="suggestion-text">年假怎么申请？</div>
                </div>
                <div class="suggestion" onclick="sendSuggestion('公司有哪些福利？')">
                    <div class="suggestion-title">🎁 员工福利</div>
                    <div class="suggestion-text">公司有哪些福利？</div>
                </div>
                <div class="suggestion" onclick="sendSuggestion('如何报销差旅费用？')">
                    <div class="suggestion-title">💰 费用报销</div>
                    <div class="suggestion-text">如何报销差旅费用？</div>
                </div>
            </div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea 
                id="messageInput" 
                placeholder="输入您的问题..." 
                rows="1"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button id="sendButton" onclick="sendMessage()" disabled>
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isReceiving = false;
        let currentMessageDiv = null;
        let currentMessageContent = ''; // 累积消息内容
        let accessToken = ''; // 存储 access token
        /** 当前会话 thread_id，与 Python WebSocket auth_success 同步 */
        let currentThreadId = null;
        let suppressWsReconnect = false;

        // Python AI：REST 历史接口 + WebSocket
        const PYTHON_API = 'http://localhost:8000/ai';
        const WS_URL = 'ws://localhost:8000/ai/ws/chat';
        const STORAGE_HISTORY_SIDEBAR = 'chat_history_sidebar_visible';

        function applyHistorySidebarState(collapsed) {
            const body = document.querySelector('.app-body');
            const btn = document.getElementById('toggleHistoryBtn');
            if (!body || !btn) return;
            body.classList.toggle('history-collapsed', collapsed);
            btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
            btn.title = collapsed ? '展开历史对话' : '收起历史对话';
            try {
                localStorage.setItem(STORAGE_HISTORY_SIDEBAR, collapsed ? '0' : '1');
            } catch (e) { /* ignore */ }
        }

        function toggleHistoryPanel() {
            const body = document.querySelector('.app-body');
            if (!body) return;
            const collapsed = !body.classList.contains('history-collapsed');
            applyHistorySidebarState(collapsed);
        }

        function initHistorySidebarPreference() {
            try {
                const v = localStorage.getItem(STORAGE_HISTORY_SIDEBAR);
                if (v === '0') {
                    applyHistorySidebarState(true);
                } else {
                    applyHistorySidebarState(false);
                }
            } catch (e) {
                applyHistorySidebarState(false);
            }
        }

        function authHeaders() {
            return {
                'Authorization': 'Bearer ' + accessToken,
                'Blade-Requested-With': 'BladeHttpRequest',
                'Tenant-Id': '000000'
            };
        }

        // 配置 marked
        marked.setOptions({
            breaks: false, // 不自动转换单个换行为 <br>，需要两个换行才会换行
            gfm: true, // GitHub Flavored Markdown
            headerIds: false,
            mangle: false
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initHistorySidebarPreference();
            // 检查登录状态
            checkLogin();
            
            // 自动调整 textarea 高度
            const textarea = document.getElementById('messageInput');
            textarea.addEventListener('input', () => {
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
                updateSendButton();
            });
        });

        // 检查登录状态
        function checkLogin() {
            accessToken = localStorage.getItem('access_token');
            
            if (!accessToken) {
                // 未登录，跳转到登录页
                window.location.href = 'login.html';
                return;
            }

            // 显示用户信息
            const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
            document.getElementById('userInfo').textContent = `欢迎，${userInfo.user_name || '用户'}`;

            loadConversationList();
            connectWebSocket();
        }

        /** 从 Python 拉取左侧历史会话列表 */
        async function loadConversationList() {
            const listEl = document.getElementById('conversationList');
            try {
                const res = await fetch(PYTHON_API + '/conversations?limit=50', { headers: authHeaders() });
                if (res.status === 401) {
                    alert('登录已过期，请重新登录');
                    logout();
                    return;
                }
                const rows = await res.json();
                if (!Array.isArray(rows)) {
                    listEl.innerHTML = '<div class="history-empty">加载失败</div>';
                    return;
                }
                if (rows.length === 0) {
                    listEl.innerHTML = '<div class="history-empty">暂无历史会话</div>';
                    return;
                }
                listEl.innerHTML = rows.map(row => {
                    const tid = row.thread_id;
                    const active = tid === currentThreadId ? ' active' : '';
                    const t = row.updated_at ? new Date(row.updated_at * 1000).toLocaleString() : '';
                    const shortTitle = tid.length > 28 ? '…' + tid.slice(-24) : tid;
                    return `<div class="history-item${active}" data-tid="${escapeAttr(tid)}" onclick="openHistoryConversation(this.dataset.tid)"><div>${escapeHtml(shortTitle)}</div><div class="history-meta">${escapeHtml(t)}</div></div>`;
                }).join('');
            } catch (e) {
                console.error(e);
                listEl.innerHTML = '<div class="history-empty">无法连接 AI 服务</div>';
            }
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s == null ? '' : String(s);
            return d.innerHTML;
        }

        function escapeAttr(s) {
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        /** 打开历史会话：展示消息并带上 thread_id 重连 WebSocket */
        async function openHistoryConversation(threadId) {
            if (!threadId) return;
            currentThreadId = threadId;
            document.querySelectorAll('.history-item').forEach(el => {
                el.classList.toggle('active', el.dataset.tid === threadId);
            });
            try {
                const res = await fetch(PYTHON_API + '/conversations/' + encodeURIComponent(threadId) + '/messages', {
                    headers: authHeaders()
                });
                if (res.status === 401) {
                    alert('登录已过期，请重新登录');
                    logout();
                    return;
                }
                if (!res.ok) {
                    alert('无法加载该会话');
                    return;
                }
                const msgs = await res.json();
                renderHistoryMessages(Array.isArray(msgs) ? msgs : []);
                disconnectWebSocket();
                connectWebSocket(threadId);
            } catch (e) {
                console.error(e);
                alert('加载消息失败');
            }
        }

        function renderHistoryMessages(msgs) {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML = '';
            if (!msgs.length) {
                chatContainer.innerHTML = '<div class="empty-state" id="emptyState"><p style="color:#6b7280;font-size:13px;">该会话暂无消息</p></div>';
                chatContainer.scrollTop = 0;
                return;
            }
            msgs.forEach(m => {
                const role = m.role === 'assistant' ? 'assistant' : 'user';
                addMessage(m.content || '', role);
            });
        }

        function disconnectWebSocket() {
            if (!ws) return;
            suppressWsReconnect = true;
            try {
                const old = ws;
                old.onclose = null;
                old.close();
            } finally {
                ws = null;
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user_info');
            window.location.href = 'login.html';
        }

        // 连接 WebSocket；resumeThreadId 可选，用于续聊历史会话
        function connectWebSocket(resumeThreadId) {
            updateConnectionStatus('connecting');
            suppressWsReconnect = false;

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log('WebSocket 连接成功');
                const payload = { token: accessToken };
                const tid = resumeThreadId != null && resumeThreadId !== '' ? resumeThreadId : currentThreadId;
                if (tid) {
                    payload.thread_id = tid;
                }
                ws.send(JSON.stringify(payload));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };

            ws.onerror = (error) => {
                console.error('WebSocket 错误:', error);
                updateConnectionStatus('disconnected');
            };

            ws.onclose = () => {
                console.log('WebSocket 连接关闭');
                updateConnectionStatus('disconnected');
                if (suppressWsReconnect) {
                    suppressWsReconnect = false;
                    return;
                }
                setTimeout(() => {
                    if (!ws || ws.readyState === WebSocket.CLOSED) {
                        connectWebSocket(currentThreadId);
                    }
                }, 5000);
            };
        }

        // 更新连接状态
        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = 'connection-status ' + status;
            
            const statusText = {
                'connecting': '正在连接...',
                'connected': '已连接',
                'disconnected': '未连接'
            };
            
            statusEl.textContent = statusText[status] || status;
        }

        // 处理 WebSocket 消息
        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'auth_success':
                    console.log('认证成功:', data.user);
                    if (data.thread_id) {
                        currentThreadId = data.thread_id;
                    }
                    updateConnectionStatus('connected');
                    loadConversationList();
                    updateSendButton();
                    break;

                case 'start':
                    isReceiving = true;
                    currentMessageContent = ''; // 重置内容
                    currentMessageDiv = addMessage('', 'assistant');
                    break;
                    
                case 'token':
                    if (currentMessageDiv) {
                        currentMessageContent += data.content; // 累积内容
                        renderMarkdown(currentMessageDiv, currentMessageContent);
                    }
                    break;
                    
                case 'end':
                    isReceiving = false;
                    currentMessageDiv = null;
                    currentMessageContent = '';
                    updateSendButton();
                    break;
                    
                case 'error':
                    isReceiving = false;
                    if (data.content && data.content.includes('token')) {
                        // token 错误，跳转到登录页
                        alert('登录已过期，请重新登录');
                        logout();
                    } else if (currentMessageDiv) {
                        currentMessageContent += '\n\n❌ ' + data.content;
                        renderMarkdown(currentMessageDiv, currentMessageContent);
                    }
                    currentMessageDiv = null;
                    currentMessageContent = '';
                    updateSendButton();
                    break;
            }
        }

        // 发送消息（使用 WebSocket）
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isReceiving || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            // 隐藏空状态（打开历史会话后可能没有 #emptyState，不能裸访问 .style）
            const emptyStateEl = document.getElementById('emptyState');
            if (emptyStateEl) {
                emptyStateEl.style.display = 'none';
            }

            // 添加用户消息
            addMessage(message, 'user');

            // 通过 WebSocket 发送消息
            ws.send(JSON.stringify({ message: message }));

            // 清空输入框
            input.value = '';
            input.style.height = 'auto';
            updateSendButton();
        }

        // 发送建议问题
        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            updateSendButton();
            sendMessage();
        }

        // 添加消息
        function addMessage(content, role) {
            const chatContainer = document.getElementById('chatContainer');
            
            // 创建外层 wrapper
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = `message-wrapper ${role}`;
            
            // 创建内层 message 容器
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = `avatar ${role}`;
            avatarDiv.textContent = role === 'user' ? '我' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (role === 'assistant' && !content) {
                contentDiv.innerHTML = '<span class="typing-indicator"></span>';
            } else if (content) {
                // 用户消息也支持简单的换行显示
                if (role === 'user') {
                    contentDiv.textContent = content;
                } else {
                    // AI 消息使用 Markdown 渲染
                    contentDiv.innerHTML = marked.parse(content);
                }
            }
            
            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);
            wrapperDiv.appendChild(messageDiv);
            chatContainer.appendChild(wrapperDiv);
            
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return contentDiv;
        }

        // 渲染 Markdown 内容
        function renderMarkdown(messageDiv, content) {
            // 移除打字指示器
            const typingIndicator = messageDiv.querySelector('.typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
            
            // 将 Markdown 转换为 HTML
            messageDiv.innerHTML = marked.parse(content);
            
            // 滚动到底部
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 追加内容到消息（保留用于兼容）
        function appendToMessage(messageDiv, content) {
            renderMarkdown(messageDiv, content);
        }

        // 清空对话（新会话）
        function clearChat() {
            currentThreadId = null;
            document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
            disconnectWebSocket();
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML = `
                <div class="empty-state" id="emptyState">
                    <h2>欢迎使用 AI 知识助手</h2>
                    <p>我可以帮您解答员工手册相关的问题</p>
                    <div class="suggestions">
                        <div class="suggestion" onclick="sendSuggestion('公司的工作时间是怎么安排的？')">
                            <div class="suggestion-title">📅 工作时间</div>
                            <div class="suggestion-text">公司的工作时间是怎么安排的？</div>
                        </div>
                        <div class="suggestion" onclick="sendSuggestion('年假怎么申请？')">
                            <div class="suggestion-title">🏖️ 年假政策</div>
                            <div class="suggestion-text">年假怎么申请？</div>
                        </div>
                        <div class="suggestion" onclick="sendSuggestion('公司有哪些福利？')">
                            <div class="suggestion-title">🎁 员工福利</div>
                            <div class="suggestion-text">公司有哪些福利？</div>
                        </div>
                        <div class="suggestion" onclick="sendSuggestion('如何报销差旅费用？')">
                            <div class="suggestion-title">💰 费用报销</div>
                            <div class="suggestion-text">如何报销差旅费用？</div>
                        </div>
                    </div>
                </div>
            `;
            connectWebSocket(null);
            loadConversationList();
        }

        // 处理按键
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 更新发送按钮状态
        function updateSendButton() {
            const input = document.getElementById('messageInput');
            const button = document.getElementById('sendButton');
            const canSend = input.value.trim() && !isReceiving && ws && ws.readyState === WebSocket.OPEN;
            button.disabled = !canSend;
        }
    </script>
</body>
</html>
